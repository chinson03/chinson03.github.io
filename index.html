<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Hinson | Biogerontology & Zoology</title>
    <style>
        :root {
            --text-main: #ffffff;
            --bg-card: rgba(0, 0, 0, 0.7);
            --header-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--text-main);
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            background-color: #000;
        }

        /* --- Header: Now White/Light --- */
        header {
            background-color: var(--header-bg);
            color: #000;
            padding: 4rem 2rem 5rem 2rem;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }
        h1 { font-size: 3.2rem; margin: 0; color: #000; }
        .subtitle { font-size: 1rem; color: #555; text-transform: uppercase; margin-top: 12px; }
        .contact { color: #333; margin-top: 2rem; display: flex; justify-content: center; gap: 15px; }
        .contact a { color: #000; text-decoration: none; border-bottom: 1px solid #000; }

        /* --- Container: Now Dark --- */
        .container { 
            background: var(--bg-card);
            backdrop-filter: blur(25px);
            padding: 3.5rem;
            margin: -45px 20px 4rem 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- Slider: Fade Animation --- */
        .slider-wrapper { position: relative; margin: 2.5rem 0; border-radius: 15px; overflow: hidden; background: #222; }
        .slides { display: none; width: 100%; transition: opacity 0.5s ease; }
        .slides.active { display: block; opacity: 1; }
        .slides img { width: 100%; display: block; }
        .prev, .next { cursor: pointer; position: absolute; top: 50%; padding: 16px; color: white; font-size: 24px; background: rgba(0,0,0,0.5); }
        .next { right: 0; }

        /* --- Text Neutralization --- */
        h2 { color: #fff; border-bottom: 1px solid #444; padding-bottom: 8px; font-size: 1.2rem; text-transform: uppercase; }
        .entry-title { font-weight: 700; }
        .entry-date { color: #aaa; }
        .skill-cat { font-weight: 800; color: #fff; }
        footer { text-align: center; color: #666; padding: 3rem; }
    </style>
</head>
<body>

<header>
    <h1>Charlie Hinson</h1>
    <div class="subtitle">Biogerontology | Zoology | Genomics</div>
    <div class="contact">
        <a href="mailto:charliescotthinson@gmail.com">Email</a>
        <a href="https://github.com/chinson03">GitHub</a>
        <a href="https://linkedin.com/in/charliescotthinson">LinkedIn</a>
    </div>
</header>

<div class="container">
    <section>
        <h2>Research Experience</h2>
        <div class="slider-wrapper">
            <div class="slides active"><img src="presentation/slide1.jpg"></div>
            <div class="slides"><img src="presentation/slide2.jpg"></div>
            <div class="slides"><img src="presentation/slide3.jpg"></div>
            <div class="slides"><img src="presentation/slide4.jpg"></div>
            <div class="slides"><img src="presentation/slide5.jpg"></div>
            <div class="slides"><img src="presentation/slide6.jpg"></div>
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
    </section>

    <section>
        <h2>Employment & Skills</h2>
        <p>Bat Emergence Surveyor, Laboratory Technician. Proficient in Python, R, MATLAB.</p>
    </section>
</div>

<script>
    let slideIndex = 0;
    function plusSlides(n) {
        let slides = document.getElementsByClassName("slides");
        slides[slideIndex].style.display = "none";
        slideIndex = (slideIndex + n + slides.length) % slides.length;
        slides[slideIndex].style.display = "block";
    }
</script>

<footer>&copy; 2026 Charlie Hinson</footer>

</body>
</html>
